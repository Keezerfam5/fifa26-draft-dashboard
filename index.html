<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIFA 2026 World Cup Pool</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="hero">
  <div class="hero-title">

    <img
      src="https://banner2.cleanpng.com/lnd/20241221/ih/b6374593827ace8ba25d0770708f34.webp"
      class="hero-trophy"
      alt="World Cup Trophy"
    >

    <div>
      <h1>FIFA 2026 World Cup Pool</h1>

      <p class="hero-subtitle">
        $100 Buy-In • $400 Winner Takes All • Live Scoring Dashboard
      </p>
    </div>

  </div>

  <button id="refreshBtn">Refresh</button>
</header>

  <main>
    <section class="card">
      <h2>Leaderboard</h2>
      <p id="updated" class="muted"></p>
      <div id="leaderboard"></div>
    </section>

    <section class="card wide">
      <h2>Owner Teams</h2>
      <div id="owners"></div>
    </section>

    <section class="card wide">
      <h2>All Teams</h2>
      <div id="teams"></div>
    </section>

    <section class="card wide">
      <h2>Schedule / Results</h2>
      <div id="games"></div>
    </section>

    <section class="card wide">
      <h2>Scoring</h2>
      <div class="rules">
        <div><strong>Group Win</strong><span>3</span></div>
        <div><strong>Group Draw</strong><span>1</span></div>
        <div><strong>Group Loss</strong><span>0</span></div>
        <div><strong>Pool Advancement</strong><span>0</span></div>
        <div><strong>Round of 16</strong><span>5</span></div>
        <div><strong>Quarterfinals</strong><span>10</span></div>
        <div><strong>Semifinals</strong><span>15</span></div>
        <div><strong>3rd Place</strong><span>10</span></div>
        <div><strong>Runner-Up</strong><span>20</span></div>
        <div><strong>Winner</strong><span>30</span></div>
      </div>
    </section>
  </main>

  <div id="matchModal" class="match-modal">
    <div class="match-modal-content">
      <button class="match-modal-close" type="button">&times;</button>
      <div id="matchModalBody"></div>
    </div>
  </div>

  <div id="teamModal" class="match-modal">
    <div class="match-modal-content">
      <button class="match-modal-close" type="button">&times;</button>
      <div id="teamModalBody"></div>
    </div>
  </div>

<div id="ownerModal" class="match-modal">
  <div class="match-modal-content">
    <button class="match-modal-close" type="button">&times;</button>
    <div id="ownerModalBody"></div>
  </div>
</div>
  
  <script src="./app.js"></script>
</body>
</html>
